# ──────────────────────────────────────────────────────
# Serena Downloader Bot — Render.com Deployment
# ──────────────────────────────────────────────────────

services:
  - type: web
    name: serena-downloader-bot
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: starter
    region: oregon

    envVars:
      - key: BOT_TOKEN
        sync: false

      - key: API_ID
        sync: false

      - key: API_HASH
        sync: false

      - key: OWNER_IDS
        value: "1598576202"

      - key: OWNER_USERNAME
        value: "Xioqui_Xan"

      - key: SUPPORT_USERNAME
        value: "TechnicalSerena"

      - key: FREE_LIMIT
        value: "3"

      - key: BASIC_LIMIT
        value: "15"

      - key: PREMIUM_LIMIT
        value: "50"

      - key: DB_PATH
        value: "/tmp/serena_db/bot.db"

      - key: DL_DIR
        value: "/tmp/serena_dl"

      - key: PORT
        value: "8080"

      # ── Optional Cookie Variables ──
      - key: YT_COOKIES
        sync: false

      - key: INSTAGRAM_COOKIES
        sync: false

      - key: TERABOX_COOKIES
        sync: false

    healthCheckPath: /health
    autoDeploy: true
